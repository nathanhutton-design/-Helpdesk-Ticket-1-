  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helpdesk Ticketing App</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: #0e1520;
      --surface2: #151e2e;
      --border: #1e2d42;
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --text: #e2e8f0;
      --muted: #64748b;
      --open: #ef4444;
      --progress: #f59e0b;
      --closed: #22c55e;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      padding: 16px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }

    .ticket-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--surface2);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      flex: 1;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* SIDEBAR */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .new-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.15s;
    }

    .new-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .new-btn:active { transform: translateY(0); }

    .search-wrap {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 10px 10px 10px 32px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    .sidebar-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
      padding: 8px 4px 4px;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--text);
      background: var(--surface2);
    }

    .filter-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    /* MAIN */
    .main {
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state .big-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 18px 20px;
      border-radius: 12px;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 24px rgba(59,130,246,0.12);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .card-title {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.3px;
    }

    .card-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      background: var(--surface2);
      padding: 3px 8px;
      border-radius: 4px;
    }

    .card-meta {
      display: flex;
      gap: 16px;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .card-meta span { display: flex; align-items: center; gap: 5px; }

    .card-desc {
      font-size: 0.85rem;
      color: #94a3b8;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .open    { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .progress{ background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
    .closed  { background: rgba(34,197,94,0.15);  color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }

    .card-actions { display: flex; gap: 8px; }

    .action-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      transition: all 0.15s;
    }

    .action-btn:hover { border-color: var(--open); color: #f87171; }
    .action-btn.edit:hover { border-color: var(--accent); color: var(--accent); }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .modal-overlay.open { display: flex; }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 460px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      animation: modalIn 0.2s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-weight: 800;
      font-size: 1.1rem;
    }

    .close-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 32px; height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }

    .close-btn:hover { border-color: var(--open); color: #f87171; }

    .modal-body { padding: 20px 24px; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 12px;
    }

    .form-group label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: var(--accent); }

    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--muted); }

    .form-group textarea { resize: vertical; min-height: 80px; }

    .form-group select option { background: var(--surface2); }

    .field-error {
      font-size: 0.72rem;
      color: #f87171;
      display: none;
    }

    .form-group.has-error input,
    .form-group.has-error textarea,
    .form-group.has-error select { border-color: var(--open); }

    .form-group.has-error .field-error { display: block; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.2s, transform 0.15s;
    }

    .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--closed);
      color: #4ade80;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 200;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.25s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎫</div>
    Helpdesk Dashboard
  </div>
  <div class="ticket-count" id="ticketCount">0 tickets</div>
</header>

<div class="layout">
  <div class="sidebar">
    <button class="new-btn" onclick="openModal()">+ New Ticket</button>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search" placeholder="Search tickets..." oninput="renderTickets()" />
    </div>

    <div class="sidebar-label">Filter by Status</div>
    <button class="filter-btn active" onclick="setFilter('all', this)">
      <span class="filter-dot" style="background:#64748b"></span> All Tickets
    </button>
    <button class="filter-btn" onclick="setFilter('open', this)">
      <span class="filter-dot" style="background:#ef4444"></span> Open
    </button>
    <button class="filter-btn" onclick="setFilter('progress', this)">
      <span class="filter-dot" style="background:#f59e0b"></span> In Progress
    </button>
    <button class="filter-btn" onclick="setFilter('closed', this)">
      <span class="filter-dot" style="background:#22c55e"></span> Closed
    </button>
  </div>

  <div class="main" id="ticketList"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">Create New Ticket</div>
      <!-- FIX 1: Close button added -->
      <button class="close-btn" onclick="closeModal()" title="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group" id="group-firstName">
          <label>First Name</label>
          <input id="firstName" placeholder="John" />
          <span class="field-error">Required</span>
        </div>
        <div class="form-group" id="group-lastName">
          <label>Last Name</label>
          <input id="lastName" placeholder="Smith" />
          <span class="field-error">Required</span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group" id="group-contact">
          <label>Contact Number</label>
          <!-- FIX 2: Phone validation applied -->
          <input id="contact" placeholder="e.g. 2125550100" />
          <span class="field-error" id="contactError">Enter 7–15 digit number</span>
        </div>
        <div class="form-group" id="group-department">
          <label>Department</label>
          <input id="department" placeholder="IT, HR, Finance..." />
          <span class="field-error">Required</span>
        </div>
      </div>

      <div class="form-group" id="group-title">
        <label>Issue Title</label>
        <input id="title" placeholder="Brief summary of the issue" />
        <span class="field-error">Required</span>
      </div>

      <div class="form-group" id="group-description">
        <label>Description</label>
        <textarea id="description" placeholder="Describe the issue in detail..." maxlength="1000"></textarea>
        <span class="field-error">Required</span>
      </div>

      <div class="form-group">
        <label>Status</label>
        <select id="status">
          <option value="open">Open</option>
          <option value="progress">In Progress</option>
          <option value="closed">Closed</option>
        </select>
      </div>

      <button class="submit-btn" onclick="addTicket()">Submit Ticket</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // FIX 3: localStorage wrapped in try/catch
  let tickets = [];
  try {
    tickets = JSON.parse(localStorage.getItem("tickets")) || [];
  } catch (e) {
    tickets = [];
  }

  let activeFilter = 'all';

  function saveTickets() {
    try {
      localStorage.setItem("tickets", JSON.stringify(tickets));
    } catch (e) {
      showToast("⚠️ Storage full — ticket not saved!", true);
    }
  }

  function setFilter(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTickets();
  }

  function renderTickets() {
    const list = document.getElementById("ticketList");
    const search = document.getElementById("search").value.toLowerCase();

    let filtered = tickets.filter(t => {
      const matchSearch =
        t.title.toLowerCase().includes(search) ||
        t.description.toLowerCase().includes(search) ||
        t.firstName.toLowerCase().includes(search) ||
        t.lastName.toLowerCase().includes(search) ||
        t.department.toLowerCase().includes(search);
      const matchFilter = activeFilter === 'all' || t.status === activeFilter;
      return matchSearch && matchFilter;
    });

    // Update count
    document.getElementById("ticketCount").textContent =
      `${filtered.length} ticket${filtered.length !== 1 ? 's' : ''}`;

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="big-icon">📭</div>
          <p>${search ? 'No tickets match your search.' : 'No tickets yet. Create one to get started.'}</p>
        </div>`;
      return;
    }

    list.innerHTML = "";
    filtered.forEach(t => {
      const div = document.createElement("div");
      div.className = "card";
      const statusLabel = t.status === 'progress' ? 'In Progress' : t.status.charAt(0).toUpperCase() + t.status.slice(1);
      div.innerHTML = `
        <div class="card-top">
          <div class="card-title">${escapeHtml(t.title)}</div>
          <div class="card-id">TKT-${String(t.id).slice(-5)}</div>
        </div>
        <div class="card-meta">
          <span>👤 ${escapeHtml(t.firstName)} ${escapeHtml(t.lastName)}</span>
          <span>🏢 ${escapeHtml(t.department)}</span>
          <span>📞 ${escapeHtml(t.contact)}</span>
        </div>
        <div class="card-desc">${escapeHtml(t.description)}</div>
        <div class="card-footer">
          <span class="status-badge ${t.status}">${statusLabel}</span>
          <div class="card-actions">
            <small style="color:var(--muted);font-size:0.72rem;align-self:center;">${t.createdAt}</small>
            <!-- FIX 4: Delete uses t.id not index -->
            <button class="action-btn" onclick="deleteTicket(${t.id})">Delete</button>
          </div>
        </div>
      `;
      list.appendChild(div);
    });
  }

  // Safety: prevent XSS from stored ticket data
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function clearErrors() {
    document.querySelectorAll('.form-group').forEach(g => g.classList.remove('has-error'));
  }

  function setError(groupId, msg) {
    const group = document.getElementById(groupId);
    if (msg) document.getElementById(groupId.replace('group-', '') + 'Error') && 
      (document.getElementById(groupId.replace('group-', '') + 'Error').textContent = msg);
    group.classList.add('has-error');
  }

  function addTicket() {
    clearErrors();

    const firstName   = document.getElementById("firstName").value.trim();
    const lastName    = document.getElementById("lastName").value.trim();
    const contact     = document.getElementById("contact").value.trim();
    const department  = document.getElementById("department").value.trim();
    const title       = document.getElementById("title").value.trim();
    const description = document.getElementById("description").value.trim();
    const status      = document.getElementById("status").value;

    let hasError = false;

    if (!firstName)   { setError("group-firstName");  hasError = true; }
    if (!lastName)    { setError("group-lastName");   hasError = true; }
    if (!department)  { setError("group-department"); hasError = true; }
    if (!title)       { setError("group-title");      hasError = true; }
    if (!description) { setError("group-description");hasError = true; }

    // FIX 2: Phone number validation — digits only, 7 to 15 characters
    if (!/^\d{7,15}$/.test(contact)) {
      document.getElementById("contactError").textContent = "Enter a valid number (7–15 digits, no spaces or dashes)";
      setError("group-contact");
      hasError = true;
    }

    if (hasError) return;

    // FIX 3: Unique ID using Date.now() — delete will now always hit the right ticket
    tickets.push({
      id: Date.now(),
      firstName,
      lastName,
      contact,
      department,
      title,
      description,
      status,
      createdAt: new Date().toLocaleString()
    });

    saveTickets();
    renderTickets();
    closeModal();
    showToast("✅ Ticket created successfully!");
  }

  // FIX 3: Delete by ID, not array index
  function deleteTicket(id) {
    if (!confirm("Delete this ticket?")) return;
    tickets = tickets.filter(t => t.id !== id);
    saveTickets();
    renderTickets();
    showToast("🗑️ Ticket deleted.");
  }

  function openModal() {
    clearErrors();
    ["firstName","lastName","contact","department","title","description"].forEach(id => {
      document.getElementById(id).value = "";
    });
    document.getElementById("status").value = "open";
    document.getElementById("modal").classList.add("open");
  }

  function closeModal() {
    document.getElementById("modal").classList.remove("open");
  }

  // Close modal when clicking the dark overlay
  document.getElementById("modal").addEventListener("click", function(e) {
    if (e.target === this) closeModal();
  });

  // Close modal with Escape key
  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") closeModal();
  });

  function showToast(msg, isError = false) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.style.borderColor = isError ? "var(--open)" : "var(--closed)";
    toast.style.color = isError ? "#f87171" : "#4ade80";
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
  }

  renderTickets();
</script>

</body>
</html>
